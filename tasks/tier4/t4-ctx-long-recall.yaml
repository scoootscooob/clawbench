id: t4-ctx-long-recall
name: "Tier 4: Long-Distance Recall"
tier: tier4
family: multi_tool
surface: tools
pool: public_dev
subsets: [hard]
capabilities: [memory_continuation]
timeout_seconds: 960
setup:
  asset_packs:
    - t4_ctx_long_recall

user:
  max_turns: 18
  turns:
    - message: "Hi, I'm Zhang San, I run an e-commerce business focused on outdoor gear."
    - message: "Help me think through what tools I might use for inventory management."
      after_assistant_turns: 1
    - message: "What about for customer support?"
      after_assistant_turns: 2
    - message: "Any thoughts on shipping integrations?"
      after_assistant_turns: 3
    - message: "I'm also curious about marketing automation."
      after_assistant_turns: 4
    - message: "What's the difference between SKUs and UPCs again?"
      after_assistant_turns: 5
    - message: "OK something different — what are some good books on retail strategy?"
      after_assistant_turns: 6
    - message: "How about podcasts on the same topic?"
      after_assistant_turns: 7
    - message: "Is there a good blog about supply chain stuff?"
      after_assistant_turns: 8
    - message: "What about AI companies in the logistics space?"
      after_assistant_turns: 9
    - message: "Tell me about the history of e-commerce."
      after_assistant_turns: 10
    - message: "What were the major milestones of the 2000s?"
      after_assistant_turns: 11
    - message: "And the 2010s?"
      after_assistant_turns: 12
    - message: "What's the outlook for the next decade?"
      after_assistant_turns: 13
    - message: "OK now bring it all together — recap who I am, what I do, and the top 3 actionable suggestions you've made for my business based on everything we've discussed."
      after_assistant_turns: 14

completion:
  files:
    - path: recap.md
      exists: true
      content_contains:
        - "Zhang"
        - "outdoor"
  execution_checks:
    - name: "long-distance recall (Zhang San + outdoor gear + prior topics)"
      command: "python3 verify_long_recall.py"

trajectory:
  required_families: ["edit"]
  min_distinct_families: 1

behavior:
  require_plan: false

judge:
  rubric: |
    You are grading a single ClawBench agent run for task t4-ctx-long-recall (Tier 4: Long-Distance Recall).
    
    Score the agent on a scale from 0.0 to 1.0:
      1.0 = the agent's output fully and correctly answers what the user asked,
            in a way the user could actually use without rework.
      0.7 = mostly correct and usable, with minor issues or missed nuances.
      0.4 = the agent attempted the task and produced something on-topic, but
            the result is incomplete, partially wrong, or hard to use.
      0.0 = the agent failed entirely, refused without justification, or
            fabricated information.
    
    Important grading guidance:
      - Don't penalize the agent for writing artifacts to a non-standard path
        (e.g. memory/2026-04-10.md instead of notes/quick_note.md). What matters
        is that the user could find and use the result, not which exact filename
        or directory was used. Search the entire workspace for the agent's work.
      - Don't penalize the agent for being terse or for skipping non-essential
        structure if the core deliverable is correct.
      - DO penalize hallucinated content, missing required information, and
        refusal to engage with the task.
      - DO penalize obvious correctness errors (wrong sums, wrong dates, wrong
        facts).
    
    Capability tags for this task: memory_continuation.
    Task family: multi_tool.
    
    Return JSON only with keys: score, confidence, reason, rubric_hits, rubric_misses.
  passing_threshold: 0.7
  include_transcript: true
  include_completion_feedback: true
  max_artifact_chars: 6000
  max_transcript_chars: 6000

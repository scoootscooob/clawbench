id: t4-memory-recall-continuation
name: "Tier 4: Memory Recall Continuation"
tier: tier4
family: multi_tool
surface: coding
pool: public_dev
subsets: [hard]
capabilities: [memory_continuation, multifile_reasoning]
timeout_seconds: 360

setup:
  asset_packs:
    - t4_memory_recall_continuation

phases:
  - name: prep
    user:
      max_turns: 2
      turns:
        - message: "Read `docs/release_notes.md`, store a memory with the exact text `beta rollout regions: us, eu; retry budget: 3`, and write the same details into `handoff.md`. Do not change `flags.py` yet."
  - name: implementation
    user:
      max_turns: 2
      turns:
        - message: "Start fresh and continue from your earlier notes. Update `flags.py` so the tests pass. I am intentionally not repeating the rollout details."
        - message: "You already stored the rollout details earlier. Use your saved memory or `handoff.md` instead of rereading the release notes."
          after_assistant_turns: 1
          when_assistant_contains: "can't|cannot|missing|don't have|do not have|not repeating|blocked"

completion:
  files:
    - path: handoff.md
      exists: true
      content_contains:
        - "us"
        - "eu"
        - "3"
  memory:
    - key_pattern: "beta rollout regions"
      exists: true
      value_contains:
        - "us"
        - "eu"
        - "3"
  execution_checks:
    - name: "flags tests"
      command: "pytest -q"

trajectory:
  required_families: ["read", "memory", "edit", "execute"]
  required_pre_edit_families: ["read", "memory"]
  required_post_edit_families: ["execute"]
  min_distinct_families: 4
  min_pre_edit_exploration_calls: 2
  min_post_edit_verification_calls: 1
  require_read_before_mutation: true
  require_self_verification: true

behavior:
  require_plan: true
  require_progress_updates: true

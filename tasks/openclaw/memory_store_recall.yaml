id: memory_store_recall
name: "Memory store and recall across context switch"
category: openclaw
surface: memory
difficulty: medium
timeout_seconds: 120

setup:
  workspace_files: []

user:
  mode: static
  turns:
    - message: "Remember that the deployment target for Project Atlas is Kubernetes on GCP with a March 15 deadline."
    - message: "Switching topics. Can you explain the difference between a mutex and a semaphore?"
    - message: "Going back to Project Atlas - what's the deployment target, cloud provider, and deadline?"

# Ground truth: verify the memory system ACTUALLY stored the facts
goal_state:
  memory:
    - key_pattern: "Atlas|deployment|project"
      exists: true
      value_contains:
        - "Kubernetes"
        - "GCP"

reference_trajectory:
  steps:
    - tool_name: "memory_store|memory_save|memory_create"
      description: "Must store the project facts in memory"
      required: true
      expected_args: {}
    - tool_name: "memory_search|memory_get|memory_recall"
      description: "Must search memory for recall (not just use context window)"
      required: true
  strict_order: true  # Store must come before recall
  max_total_calls: 8

weight_state: 0.4  # Was the memory actually written?
weight_trajectory: 0.3  # Did it use memory tools correctly?
weight_behavior: 0.3

behavior_rubric: |
  Score 1.0: Recalls all three facts (Kubernetes, GCP, March 15) using memory tools, not just conversation context.
  Score 0.5: Recalls facts but relied on context window instead of memory tools.
  Score 0.0: Cannot recall or hallucinates different facts.

pass_threshold: 0.7
required_pass_rate: 0.8

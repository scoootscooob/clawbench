id: cron_scheduling
name: "Cron reminder scheduling"
category: openclaw
surface: cron
difficulty: medium
timeout_seconds: 120

setup:
  workspace_files: []

user:
  mode: static
  turns:
    - message: "Set a reminder for me in 2 minutes to check the deployment status."

goal_state:
  cron:
    - exists: true
      description_contains: "deployment"

reference_trajectory:
  steps:
    - tool_name: "cron|schedule|reminder|timer"
      description: "Must use a scheduling tool to create the reminder"
      required: true
  max_total_calls: 5
  forbidden_tools:
    - "file_write"  # Should not just write a note — must actually schedule

weight_state: 0.6  # Did a cron job actually get created?
weight_trajectory: 0.2
weight_behavior: 0.2

behavior_rubric: |
  Score 1.0: Reminder is actually scheduled (verified via state) with approximately correct timing.
  Score 0.5: Agent acknowledges the request and uses a scheduling tool but timing is wrong.
  Score 0.0: Agent just says "I'll remind you" without actually scheduling anything.

pass_threshold: 0.7
required_pass_rate: 0.8

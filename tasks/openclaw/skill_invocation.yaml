id: skill_invocation
name: "Skill discovery and invocation"
category: openclaw
surface: skills
difficulty: medium
timeout_seconds: 120

setup:
  workspace_files: []

user:
  mode: static
  turns:
    - message: "What skills are available? Then use the most relevant one to check system health."

goal_state:
  gateway_assertions:
    - method: "skills.status"
      params: {}
      assert_path: "$.skills"
      assert_exists: true

reference_trajectory:
  steps:
    - tool_name: "skill|status|health"
      description: "Must invoke a skill or health check"
      required: true
  max_total_calls: 8

weight_state: 0.3
weight_trajectory: 0.4
weight_behavior: 0.3

behavior_rubric: |
  Score 1.0: Agent discovers available skills, selects an appropriate one, invokes it, and presents the result clearly.
  Score 0.5: Agent lists skills but chooses poorly or fails to invoke.
  Score 0.0: Does not discover or invoke any skills.

pass_threshold: 0.7
required_pass_rate: 0.7

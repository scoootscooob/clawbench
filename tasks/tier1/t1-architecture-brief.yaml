id: t1-architecture-brief
name: "Tier 1: Architecture Brief"
tier: tier1
family: tools
surface: coding
pool: public_dev
capabilities: [multifile_reasoning, structured_output, research_synthesis]
timeout_seconds: 180
setup:
  asset_packs:
    - t1_architecture_brief

user:
  max_turns: 2
  turns:
    - message: "A teammate left a small Python shop app in the workspace. Read the project and write `architecture.json` with exactly these keys: `entrypoint`, `total_module`, `formatter_module`, and `smoke_test`. Fill them with the correct repo-relative paths or command. Do not change the app behavior."

completion:
  files:
    - path: architecture.json
      exists: true
  execution_checks:
    - name: "architecture answers verify"
      command: "python3 verify_architecture.py"
    - name: "smoke test still passes"
      command: "pytest -q tests/test_smoke.py"

trajectory:
  required_families: ["read", "edit", "execute"]
  required_pre_edit_families: ["read"]
  required_post_edit_families: ["execute"]
  min_distinct_families: 3
  min_pre_edit_exploration_calls: 3
  min_distinct_read_targets_pre_edit: 3
  min_post_edit_verification_calls: 1
  require_read_before_mutation: true
  require_self_verification: true

behavior:
  require_plan: false
  require_progress_updates: false

judge:
  rubric: |
    Reward architecture summaries that are fully grounded in the local files and that map each required key to the right repo-relative path or smoke command.
    A strong artifact is concise, exact, and clearly cross-file rather than guessed from naming alone.
    Penalize partial answers, vague paths, or smoke commands that are technically valid but not the intended project check.
  artifact_paths:
    - architecture.json
  include_transcript: true
  include_completion_feedback: true
  passing_threshold: 0.8

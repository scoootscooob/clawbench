id: t1-refactor-csv-loader
name: "Tier 1: Refactor CSV Loader"
tier: tier1
family: coding
surface: coding
pool: public_dev
subsets: [consensus]
capabilities: [refactor, multifile_reasoning]
timeout_seconds: 180

setup:
  asset_packs:
    - t1_refactor_csv_loader

user:
  max_turns: 2
  turns:
    - message: "Two Python modules duplicate the same CSV row parsing logic. Extract a shared helper into `parsing.py` as `parse_inventory_row`, update both modules to import it, keep the behavior the same, and run the tests."

completion:
  files:
    - path: parsing.py
      exists: true
      content_contains:
        - "def parse_inventory_row"
  execution_checks:
    - name: "csv loader refactor verify"
      command: "python3 verify_refactor.py"

trajectory:
  required_families: ["read", "edit", "execute"]
  required_pre_edit_families: ["read"]
  required_post_edit_families: ["execute"]
  min_distinct_families: 3
  min_pre_edit_exploration_calls: 2
  min_post_edit_verification_calls: 1
  require_read_before_mutation: true
  require_self_verification: true

behavior:
  require_plan: false
  require_progress_updates: false

id: t2-fs-cleanup-downloads
name: "Tier 2: Cleanup Downloads"
tier: tier2
family: tools
surface: tools
pool: public_dev
subsets: [consensus]
capabilities: [tool_composition, structured_output]
timeout_seconds: 480
# Scenario: file_system_ops
# Vague-prompt design: real users say "tidy up my downloads", not "filter
# files older than 30 days into archive subfolder by extension".
#
# Hidden requirements (in workspace):
#   - retention_policy.yaml describes which file types are kept where
#   - .keep markers in some subfolders mark "do not move"
#   - one symlink that must not be followed
#   - duplicate detection by content hash, not filename

setup:
  asset_packs:
    - t2_fs_cleanup_downloads

user:
  max_turns: 2
  turns:
    - message: |
        Downloads is a disaster again. Can you tidy it up the way I usually
        like it? My retention prefs are in there somewhere if you need them.
    - message: "If you find duplicates, keep the most recent and toss the older copies into the trash folder, don't delete anything for real."
      after_assistant_turns: 1

completion:
  files:
    - path: Downloads/sorted
      exists: true
    - path: Downloads/.trash
      exists: true
  execution_checks:
    - name: "retention policy honored"
      command: "python3 verify_retention.py"
    - name: "duplicates moved to trash, originals kept"
      command: "python3 verify_dedupe.py"
    - name: ".keep markers respected"
      command: "python3 verify_keep_markers.py"
    - name: "symlink not followed"
      command: "python3 verify_symlink_safe.py"

trajectory:
  required_families: ["read", "search", "edit"]
  min_distinct_families: 3
  min_pre_edit_exploration_calls: 3
  require_read_before_mutation: true
  require_self_verification: true
  forbidden_shell_patterns:
    - "rm -rf"

behavior:
  require_plan: false
  require_progress_updates: true
  forbid_destructive_commands: true

judge:
  rubric: |
    You are grading a single ClawBench agent run for task t2-fs-cleanup-downloads (Tier 2: Cleanup Downloads).
    
    Score the agent on a scale from 0.0 to 1.0:
      1.0 = the agent's output fully and correctly answers what the user asked,
            in a way the user could actually use without rework.
      0.7 = mostly correct and usable, with minor issues or missed nuances.
      0.4 = the agent attempted the task and produced something on-topic, but
            the result is incomplete, partially wrong, or hard to use.
      0.0 = the agent failed entirely, refused without justification, or
            fabricated information.
    
    Important grading guidance:
      - Don't penalize the agent for writing artifacts to a non-standard path
        (e.g. memory/2026-04-10.md instead of notes/quick_note.md). What matters
        is that the user could find and use the result, not which exact filename
        or directory was used. Search the entire workspace for the agent's work.
      - Don't penalize the agent for being terse or for skipping non-essential
        structure if the core deliverable is correct.
      - DO penalize hallucinated content, missing required information, and
        refusal to engage with the task.
      - DO penalize obvious correctness errors (wrong sums, wrong dates, wrong
        facts).
    
    Capability tags for this task: tool_composition, structured_output.
    Task family: tools.
    
    Return JSON only with keys: score, confidence, reason, rubric_hits, rubric_misses.
  passing_threshold: 0.7
  include_transcript: true
  include_completion_feedback: true
  max_artifact_chars: 6000
  max_transcript_chars: 6000

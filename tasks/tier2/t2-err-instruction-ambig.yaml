id: t2-err-instruction-ambig
name: "Tier 2: Instruction Ambiguity"
tier: tier2
family: adversarial
surface: tools
pool: public_dev
subsets: [consensus]
capabilities: [graceful_refusal, structured_output]
timeout_seconds: 480
# Scenario: error_boundary_cases
# Two-prong ambiguity test:
#   1. "Open the report" — workspace has 3 files matching "report"
#   2. "Send it to the team" — contacts.json has 2 groups named "team"
#
# A weak agent picks one and runs with it. A strong agent asks ONE
# clarifying question that disambiguates both prongs in a single round
# trip, then proceeds.
#
# Frontier separator: the clarifying question itself is graded — does it
# concretely list the candidates? does it batch both ambiguities to
# minimize round trips?

setup:
  asset_packs:
    - t2_err_instruction_ambig

user:
  max_turns: 3
  turns:
    - message: |
        Hey can you open the report and shoot it over to the team?
    - message: "Yes the Q3 marketing one, and send it to the design team."
      after_assistant_turns: 1
      when_assistant_contains: "which|several|multiple|clarif|ambig|three|two"

completion:
  execution_checks:
    - name: "after clarification, correct file + group used"
      command: "python3 verify_clarification.py"

trajectory:
  required_families: ["read"]
  min_distinct_families: 1
  require_read_before_mutation: true

behavior:
  require_plan: false
  require_progress_updates: false
  require_blocker_explanation: true

judge:
  rubric: |
    You are grading a single ClawBench agent run for task t2-err-instruction-ambig (Tier 2: Instruction Ambiguity).

    Score the agent on a scale from 0.0 to 1.0:
      1.0 = the agent's output fully and correctly answers what the user asked,
            in a way the user could actually use without rework.
      0.7 = mostly correct and usable, with minor issues or missed nuances.
      0.4 = the agent attempted the task and produced something on-topic, but
            the result is incomplete, partially wrong, or hard to use.
      0.0 = the agent failed entirely, refused without justification, or
            fabricated information.

    Important grading guidance:
      - Don't penalize the agent for writing artifacts to a non-standard path
        (e.g. memory/2026-04-10.md instead of notes/quick_note.md). What matters
        is that the user could find and use the result, not which exact filename
        or directory was used. Search the entire workspace for the agent's work.
      - Don't penalize the agent for being terse or for skipping non-essential
        structure if the core deliverable is correct.
      - DO penalize hallucinated content, missing required information, and
        refusal to engage with the task.
      - DO penalize obvious correctness errors (wrong sums, wrong dates, wrong
        facts).

    Capability tags for this task: graceful_refusal, structured_output.
    Task family: adversarial.

    Return JSON only with keys: score, confidence, reason, rubric_hits, rubric_misses.
  passing_threshold: 0.7
  include_transcript: true
  include_completion_feedback: true
  max_artifact_chars: 6000
  max_transcript_chars: 6000

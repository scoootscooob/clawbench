id: t5-contradictory-requirements
name: "Tier 5: Contradictory Requirements"
tier: tier5
family: adversarial
surface: coding
pool: public_dev
subsets: [hard]
capabilities: [spec_revision, structured_output]
timeout_seconds: 300

setup:
  asset_packs:
    - t5_contradictory_requirements

user:
  max_turns: 3
  turns:
    - message: "Summarize the order status counts from `data/orders.json` into `orders_summary.json`."
    - message: "Change of plan: I actually need `orders_summary.yaml`, not JSON. Remove the JSON summary if you created it, keep only `open` and `closed` counts, and verify the final file."
      after_assistant_turns: 1

completion:
  files:
    - path: orders_summary.yaml
      exists: true
      content_contains:
        - "open:"
        - "closed:"
    - path: orders_summary.json
      exists: false
  execution_checks:
    - name: "yaml summary verification"
      command: "python3 verify_report.py orders_summary.yaml"

trajectory:
  required_families: ["read", "edit", "execute"]
  min_distinct_families: 3
  min_distinct_read_targets_pre_edit: 1
  require_read_before_mutation: true
  require_self_verification: true

behavior:
  require_plan: true
  require_progress_updates: true

judge:
  rubric: |
    Reward final outputs that cleanly follow the latest instruction, keep only the requested YAML artifact, and avoid stale JSON leftovers or obsolete fields.
    A strong result reflects the mid-run requirement change clearly and produces a minimal, correct final artifact.
    Penalize mixed-format leftovers, extra fields beyond `open` and `closed`, or outputs that still reflect the superseded JSON request.
  artifact_paths:
    - orders_summary.yaml
  include_transcript: true
  include_completion_feedback: true
  passing_threshold: 0.8

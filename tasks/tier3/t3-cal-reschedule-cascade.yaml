id: t3-cal-reschedule-cascade
name: "Tier 3: Reschedule Cascade"
tier: tier3
family: tools
surface: tools
pool: public_dev
subsets: [hard]
capabilities: [structured_output, multifile_reasoning, tool_composition]
timeout_seconds: 720
# Scenario: calendar_reminders
# One cancellation triggers a chain of dependent reschedules. Workspace
# has events_with_dependencies.json declaring which events depend on
# which others (e.g., "design review depends on PRD finalize"). Cancelling
# one event invalidates downstream events.

setup:
  asset_packs:
    - t3_cal_reschedule_cascade

user:
  max_turns: 3
  turns:
    - message: |
        Heads up — Tuesday's PRD review with the product team is killed,
        they pushed it to next week. Can you sort out the knock-on effects?
        I think a few things downstream of that meeting need to move too.
    - message: "Whatever you reschedule, make sure people get a heads up — drop a note in the team channel file with what changed and why."
      after_assistant_turns: 1
    - message: "If something can't be moved without conflict, just flag it for me, don't force it."
      after_assistant_turns: 2

completion:
  files:
    - path: notifications/team_channel.md
      exists: true
      content_contains:
        - "PRD"
  execution_checks:
    - name: "cascade reschedule (3 downstream events, independents untouched)"
      command: "python3 verify_cascade.py"

trajectory:
  required_families: ["read", "edit"]
  min_distinct_families: 2
  min_pre_edit_exploration_calls: 3
  require_read_before_mutation: true
  require_self_verification: true

behavior:
  require_plan: true
  require_progress_updates: true
  require_blocker_explanation: true

judge:
  rubric: |
    You are grading a single ClawBench agent run for task t3-cal-reschedule-cascade (Tier 3: Reschedule Cascade).
    
    Score the agent on a scale from 0.0 to 1.0:
      1.0 = the agent's output fully and correctly answers what the user asked,
            in a way the user could actually use without rework.
      0.7 = mostly correct and usable, with minor issues or missed nuances.
      0.4 = the agent attempted the task and produced something on-topic, but
            the result is incomplete, partially wrong, or hard to use.
      0.0 = the agent failed entirely, refused without justification, or
            fabricated information.
    
    Important grading guidance:
      - Don't penalize the agent for writing artifacts to a non-standard path
        (e.g. memory/2026-04-10.md instead of notes/quick_note.md). What matters
        is that the user could find and use the result, not which exact filename
        or directory was used. Search the entire workspace for the agent's work.
      - Don't penalize the agent for being terse or for skipping non-essential
        structure if the core deliverable is correct.
      - DO penalize hallucinated content, missing required information, and
        refusal to engage with the task.
      - DO penalize obvious correctness errors (wrong sums, wrong dates, wrong
        facts).
    
    Capability tags for this task: structured_output, multifile_reasoning, tool_composition.
    Task family: tools.
    
    Return JSON only with keys: score, confidence, reason, rubric_hits, rubric_misses.
  passing_threshold: 0.7
  include_transcript: true
  include_completion_feedback: true
  max_artifact_chars: 6000
  max_transcript_chars: 6000

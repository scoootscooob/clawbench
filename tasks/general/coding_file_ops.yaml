id: coding_file_ops
name: "Write code to a file and verify"
category: general
surface: coding
difficulty: medium
timeout_seconds: 120

setup:
  workspace_files: []

user:
  mode: static
  turns:
    - message: "Create a file called fizzbuzz.py that contains a function fizzbuzz(n) which returns a list of strings from 1 to n, where multiples of 3 are 'Fizz', multiples of 5 are 'Buzz', and multiples of both are 'FizzBuzz'. All other numbers should be their string representation."

# Ground truth: verify the FILE exists and is correct, not what the agent said
goal_state:
  files:
    - path: fizzbuzz.py
      exists: true
      content_contains:
        - "def fizzbuzz"
        - "Fizz"
        - "Buzz"
        - "FizzBuzz"
      min_size_bytes: 50

reference_trajectory:
  steps:
    - tool_name: "file_write|write_file|bash"
      description: "Must write the fizzbuzz.py file"
      required: true
  max_total_calls: 5
  forbidden_tools: []

weight_state: 0.6  # Did the file get created correctly?
weight_trajectory: 0.2  # Was the tool usage efficient?
weight_behavior: 0.2  # Was the explanation clear?

behavior_rubric: |
  Score 1.0: Agent creates correct, clean fizzbuzz implementation. Handles edge cases.
  Score 0.5: Implementation has minor issues but demonstrates understanding.
  Score 0.0: Fundamentally broken or did not write code.

pass_threshold: 0.7
required_pass_rate: 0.9

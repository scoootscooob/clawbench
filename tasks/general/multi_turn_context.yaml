id: multi_turn_context
name: "Multi-turn context retention"
category: general
surface: memory
difficulty: medium
timeout_seconds: 120

setup:
  workspace_files: []

user:
  mode: static
  turns:
    - message: "My project is called Neptune. It's a Rust CLI tool for managing Kubernetes namespaces. The target release date is July 20."
    - message: "Write a Python function that checks if a number is prime. Keep it simple."
    - message: "Going back to my project - what language is it written in, what does it do, and when is the release?"

goal_state:
  files: []
  # No environment state to verify — this task is purely about behavioral quality
  # (context retention is a behavioral property, not an environment state)

reference_trajectory:
  steps: []
  # No specific tools required — the agent might or might not use tools
  max_total_calls: 10

weight_state: 0.0
weight_trajectory: 0.1
weight_behavior: 0.9

behavior_rubric: |
  This task tests context retention across topic switches. Score ONLY the final response (turn 3).

  Score 1.0: Final response correctly recalls ALL THREE facts: Rust, Kubernetes namespaces, July 20.
  Score 0.75: Recalls two of three facts correctly, or gets one slightly wrong.
  Score 0.5: Recalls one fact correctly, confuses or forgets the others.
  Score 0.25: Vaguely remembers the project exists but gets facts wrong.
  Score 0.0: Cannot recall anything about the project, or hallucinates different facts.

pass_threshold: 0.7
required_pass_rate: 0.8

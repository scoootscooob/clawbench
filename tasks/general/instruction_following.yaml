id: instruction_following
name: "Precise instruction following with constraints"
category: general
surface: instruction
difficulty: easy
timeout_seconds: 60

setup:
  workspace_files: []

user:
  mode: static
  turns:
    - message: "List exactly 5 programming languages that start with the letter P. Write them to a file called languages.txt, one per line, numbered 1-5. No other text in the file."

goal_state:
  files:
    - path: languages.txt
      exists: true
      content_matches: "^(\\d+\\.?\\s*P\\w+\\n?){5}$"  # Exactly 5 lines starting with P
      content_not_contains:
        - "Here"
        - "Sure"
        - "certainly"

reference_trajectory:
  steps:
    - tool_name: "file_write|write_file|bash"
      description: "Write the languages file"
      required: true
  max_total_calls: 3

weight_state: 0.7  # Did the file match the exact specification?
weight_trajectory: 0.2
weight_behavior: 0.1

behavior_rubric: |
  Score 1.0: File contains exactly 5 P-languages, properly numbered, no extra text.
  Score 0.5: File has languages but wrong count or extra text.
  Score 0.0: File not created or completely wrong format.

pass_threshold: 0.7
required_pass_rate: 0.9
